<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="560" height="400">
  <!-- Stacked layout: icon top, wordmark middle, tagline bottom -->
  <g transform="translate(90, 8)">
    <!-- Banner ribbon (3 brand bands curving over roof) -->
    <path d="M 4 14 Q 50 -8 96 8 L 96 18 Q 52 2 4 28 Z" fill="#8B5E3C"/>
    <path d="M 4 28 Q 52 2 96 18 L 96 28 Q 54 12 4 40 Z" fill="#C4884A"/>
    <path d="M 4 40 Q 54 12 96 28 L 96 38 Q 55 22 4 52 Z" fill="#EBE4DC" opacity="0.95"/>
    <!-- House roof outline -->
    <path d="M 8 88 L 50 30 L 92 88" fill="none" stroke="#B07D5A" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="8" y1="88" x2="92" y2="88" stroke="#B07D5A" stroke-width="3.2" stroke-linecap="round"/>
    <!-- Star in the roof peak -->
    <polygon points="50,46 53,55 62.5,55 54.8,60.5 57.8,69.5 50,64 42.2,69.5 45.2,60.5 37.5,55 47,55" fill="#C4884A"/>
  </g>
  <!-- WORDMARK -->
  <text x="140" y="140" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="36" font-weight="700" fill="#FAF8F6" letter-spacing="-0.8">TxPropertySource<tspan font-size="24" fill="#C4884A">.com</tspan></text>
  <!-- Divider -->
  <line x1="60" y1="156" x2="220" y2="156" stroke="#C4884A" stroke-width="1" opacity="0.6"/>
  <!-- Tagline -->
  <text x="140" y="178" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="600" fill="#B07D5A" letter-spacing="4">FIND IT TODAY, MOVE IN TOMORROW!</text>
</svg>
